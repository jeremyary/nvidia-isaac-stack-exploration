# PIPELINE DEFINITION
# Name: isaac-synth-train-validate
# Description: Synthetic data generation with Isaac Sim Replicator, model training with TAO DetectNet_v2, and experiment tracking + model registration with MLflow.
# Inputs:
#    batch_size: int [Default: 4.0]
#    distractors: str [Default: 'warehouse']
#    encryption_key: str [Default: 'tao_key']
#    epochs: int [Default: 2.0]
#    experiment_name: str [Default: 'palletjack-detectnet-v2']
#    height: int [Default: 544.0]
#    map_threshold: float [Default: 0.0]
#    mlflow_s3_endpoint: str [Default: 'http://minio.isaac-mlops-poc.svc:9000']
#    mlflow_tracking_uri: str [Default: 'https://mlflow.redhat-ods-applications.svc:8443']
#    num_frames: int [Default: 100.0]
#    width: int [Default: 960.0]
components:
  comp-clone-sdg-repo:
    executorLabel: exec-clone-sdg-repo
  comp-convert-to-tfrecords:
    executorLabel: exec-convert-to-tfrecords
  comp-evaluate-and-register:
    executorLabel: exec-evaluate-and-register
    inputDefinitions:
      parameters:
        batch_size:
          parameterType: NUMBER_INTEGER
        distractors:
          parameterType: STRING
        epochs:
          parameterType: NUMBER_INTEGER
        experiment_name:
          parameterType: STRING
        height:
          parameterType: NUMBER_INTEGER
        map_threshold:
          parameterType: NUMBER_DOUBLE
        mlflow_s3_endpoint:
          parameterType: STRING
        mlflow_tracking_uri:
          parameterType: STRING
        num_frames:
          parameterType: NUMBER_INTEGER
        width:
          parameterType: NUMBER_INTEGER
    outputDefinitions:
      parameters:
        Output:
          parameterType: STRING
  comp-generate-synthetic-data:
    executorLabel: exec-generate-synthetic-data
    inputDefinitions:
      parameters:
        distractors:
          parameterType: STRING
        height:
          parameterType: NUMBER_INTEGER
        num_frames:
          parameterType: NUMBER_INTEGER
        width:
          parameterType: NUMBER_INTEGER
  comp-train-detectnet:
    executorLabel: exec-train-detectnet
    inputDefinitions:
      parameters:
        encryption_key:
          parameterType: STRING
deploymentSpec:
  executors:
    exec-clone-sdg-repo:
      container:
        args:
        - if [ -d /workspace/sdg/palletjack_sdg ]; then echo 'SDG repo already cloned,
          skipping'; else rm -rf /workspace/sdg/lost+found && git clone --depth 1
          https://github.com/NVIDIA-AI-IOT/synthetic_data_generation_training_workflow.git
          /workspace/sdg; fi
        command:
        - /bin/sh
        - -c
        image: alpine/git:latest
    exec-convert-to-tfrecords:
      container:
        args:
        - echo '=== Converting KITTI to TFRecords ===' && mkdir -p /workspace/tfrecords/warehouse
          && detectnet_v2 dataset_convert -d /workspace/specs/tfrecords_warehouse.txt
          -o /workspace/tfrecords/warehouse/tfrecord && echo '=== Conversion complete
          ===' && ls -la /workspace/tfrecords/warehouse/
        command:
        - /bin/bash
        - -c
        image: nvcr.io/nvidia/tao/tao-toolkit:5.0.0-tf1.15.5
        resources:
          accelerator:
            count: '1'
            resourceCount: '1'
            resourceType: nvidia.com/gpu
            type: nvidia.com/gpu
          cpuLimit: 8.0
          cpuRequest: 4.0
          memoryLimit: 34.359738368
          memoryRequest: 17.179869184
          resourceCpuLimit: '8'
          resourceCpuRequest: '4'
          resourceMemoryLimit: 32Gi
          resourceMemoryRequest: 16Gi
    exec-evaluate-and-register:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - evaluate_and_register
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'mlflow>=3.5.0'\
          \ 'boto3>=1.34.0'  &&  python3 -m pip install --quiet --no-warn-script-location\
          \ 'kfp==2.16.0' '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"\
          3.9\"' && \"$0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef evaluate_and_register(\n    mlflow_tracking_uri: str,\n    mlflow_s3_endpoint:\
          \ str,\n    experiment_name: str,\n    num_frames: int,\n    height: int,\n\
          \    width: int,\n    distractors: str,\n    epochs: int,\n    batch_size:\
          \ int,\n    map_threshold: float,\n) -> str:\n    \"\"\"Parse training status.json,\
          \ log metrics to MLflow, register model if mAP > threshold.\"\"\"\n    import\
          \ json\n    import os\n\n    os.environ[\"MLFLOW_S3_ENDPOINT_URL\"] = mlflow_s3_endpoint\n\
          \    os.environ[\"AWS_ACCESS_KEY_ID\"] = os.environ.get(\"MINIO_ACCESS_KEY\"\
          , \"minio\")\n    os.environ[\"AWS_SECRET_ACCESS_KEY\"] = os.environ.get(\"\
          MINIO_SECRET_KEY\", \"minio123\")\n    os.environ[\"MLFLOW_TRACKING_INSECURE_TLS\"\
          ] = \"true\"\n    # RHOAI MLflow uses TLS + K8s workspace auth:\n    # -\
          \ Bearer token from ServiceAccount for authentication\n    # - X-MLFLOW-WORKSPACE\
          \ header (= pod namespace) for workspace context\n    sa_token_path = \"\
          /var/run/secrets/kubernetes.io/serviceaccount/token\"\n    sa_ns_path =\
          \ \"/var/run/secrets/kubernetes.io/serviceaccount/namespace\"\n    if os.path.exists(sa_token_path):\n\
          \        with open(sa_token_path) as f:\n            os.environ[\"MLFLOW_TRACKING_TOKEN\"\
          ] = f.read().strip()\n    workspace = \"default\"\n    if os.path.exists(sa_ns_path):\n\
          \        with open(sa_ns_path) as f:\n            workspace = f.read().strip()\n\
          \n    import mlflow\n    from mlflow.tracking.request_header.registry import\
          \ _request_header_provider_registry\n\n    class _WorkspaceHeaderProvider:\n\
          \        \"\"\"Injects X-MLFLOW-WORKSPACE header for RHOAI MLflow K8s auth.\"\
          \"\"\n        def in_context(self):\n            return True\n        def\
          \ request_headers(self):\n            return {\"X-MLFLOW-WORKSPACE\": workspace}\n\
          \n    _request_header_provider_registry.register(_WorkspaceHeaderProvider)\n\
          \n    mlflow.set_tracking_uri(mlflow_tracking_uri)\n    mlflow.set_experiment(experiment_name)\n\
          \n    # Parse training results (TAO writes NDJSON \u2014 one JSON object\
          \ per line)\n    status_file = \"/workspace/output/resnet18_palletjack/status.json\"\
          \n    with open(status_file) as f:\n        lines = [line.strip() for line\
          \ in f if line.strip()]\n    status = json.loads(lines[-1]) if lines else\
          \ {}\n\n    final_map = 0.0\n    final_loss = 0.0\n    if \"results\" in\
          \ status:\n        results = status[\"results\"]\n        if isinstance(results,\
          \ list) and results:\n            last = results[-1]\n            final_map\
          \ = last.get(\"mean_average_precision\", 0.0)\n            final_loss =\
          \ last.get(\"loss\", 0.0)\n        elif isinstance(results, dict):\n   \
          \         final_map = results.get(\"mean_average_precision\", 0.0)\n   \
          \         final_loss = results.get(\"loss\", 0.0)\n\n    model_path = \"\
          /workspace/output/resnet18_palletjack/weights/model.hdf5\"\n    model_exists\
          \ = os.path.exists(model_path)\n\n    print(f\"Final mAP: {final_map}\"\
          )\n    print(f\"Final loss: {final_loss}\")\n    print(f\"Model exists:\
          \ {model_exists}\")\n    print(f\"mAP threshold: {map_threshold}\")\n\n\
          \    with mlflow.start_run() as run:\n        mlflow.log_params({\n    \
          \        \"num_frames\": num_frames,\n            \"image_height\": height,\n\
          \            \"image_width\": width,\n            \"distractors\": distractors,\n\
          \            \"epochs\": epochs,\n            \"batch_size\": batch_size,\n\
          \            \"architecture\": \"resnet18\",\n            \"detector\":\
          \ \"detectnet_v2\",\n        })\n\n        mlflow.log_metrics({\n      \
          \      \"final_map\": final_map,\n            \"final_loss\": final_loss,\n\
          \        })\n\n        mlflow.log_artifact(status_file, artifact_path=\"\
          training_output\")\n\n        spec_file = \"/workspace/specs/training_resnet18.txt\"\
          \n        if os.path.exists(spec_file):\n            mlflow.log_artifact(spec_file,\
          \ artifact_path=\"specs\")\n\n        if model_exists and final_map >= map_threshold:\n\
          \            mlflow.log_artifact(model_path, artifact_path=\"model\")\n\
          \            client = mlflow.MlflowClient()\n            try:\n        \
          \        client.create_registered_model(\"palletjack-detectnet-v2\")\n \
          \           except mlflow.exceptions.MlflowException:\n                pass\
          \  # already exists\n            client.create_model_version(\n        \
          \        name=\"palletjack-detectnet-v2\",\n                source=f\"runs:/{run.info.run_id}/model\"\
          ,\n                run_id=run.info.run_id,\n            )\n            result\
          \ = f\"REGISTERED (mAP={final_map:.4f} >= {map_threshold})\"\n        elif\
          \ model_exists:\n            mlflow.log_artifact(model_path, artifact_path=\"\
          model\")\n            result = f\"LOGGED_ONLY (mAP={final_map:.4f} < {map_threshold})\"\
          \n        else:\n            result = f\"NO_MODEL (model file not found)\"\
          \n\n        mlflow.set_tag(\"result\", result)\n        print(f\"Result:\
          \ {result}\")\n        print(f\"MLflow run ID: {run.info.run_id}\")\n\n\
          \    return result\n\n"
        image: registry.access.redhat.com/ubi9/python-311:latest
    exec-generate-synthetic-data:
      container:
        args:
        - -c
        - 'echo "=== Isaac Sim Headless Datagen ===" && nvidia-smi && cd /workspace/sdg/palletjack_sdg
          && /isaac-sim/python.sh standalone_palletjack_sdg.py --headless True --height
          "$1" --width "$2" --num_frames "$3" --distractors "$4" --data_dir "/output/palletjack_data/$4"
          && echo "=== Datagen complete ===" && echo "RGB: $(ls /output/palletjack_data/$4/Camera/rgb/
          | wc -l)" && echo "Labels: $(ls /output/palletjack_data/$4/Camera/object_detection/
          | wc -l)"'
        - --
        - '{{$.inputs.parameters[''height'']}}'
        - '{{$.inputs.parameters[''width'']}}'
        - '{{$.inputs.parameters[''num_frames'']}}'
        - '{{$.inputs.parameters[''distractors'']}}'
        command:
        - /bin/bash
        env:
        - name: ACCEPT_EULA
          value: Y
        - name: PRIVACY_CONSENT
          value: Y
        image: nvcr.io/nvidia/isaac-sim:4.5.0
        resources:
          accelerator:
            count: '1'
            resourceCount: '1'
            resourceType: nvidia.com/gpu
            type: nvidia.com/gpu
          cpuLimit: 8.0
          cpuRequest: 4.0
          memoryLimit: 34.359738368
          memoryRequest: 17.179869184
          resourceCpuLimit: '8'
          resourceCpuRequest: '4'
          resourceMemoryLimit: 32Gi
          resourceMemoryRequest: 16Gi
    exec-train-detectnet:
      container:
        args:
        - -c
        - echo '=== TAO DetectNet_v2 Training ===' && nvidia-smi && mkdir -p /workspace/pretrained
          /workspace/output/resnet18_palletjack && wget -q --content-disposition 'https://api.ngc.nvidia.com/v2/models/nvidia/tao/pretrained_detectnet_v2/versions/resnet18/files/resnet18.hdf5'
          -O /workspace/pretrained/resnet18.hdf5 && detectnet_v2 train -e /workspace/specs/training_resnet18.txt
          -r /workspace/output/resnet18_palletjack -k "$1" --gpus 1 && echo '=== Training
          complete ===' && find /workspace/output/ -type f | head -20 && ls -la /workspace/output/resnet18_palletjack/weights/
        - --
        - '{{$.inputs.parameters[''encryption_key'']}}'
        command:
        - /bin/bash
        image: nvcr.io/nvidia/tao/tao-toolkit:5.0.0-tf1.15.5
        resources:
          accelerator:
            count: '1'
            resourceCount: '1'
            resourceType: nvidia.com/gpu
            type: nvidia.com/gpu
          cpuLimit: 8.0
          cpuRequest: 4.0
          memoryLimit: 34.359738368
          memoryRequest: 17.179869184
          resourceCpuLimit: '8'
          resourceCpuRequest: '4'
          resourceMemoryLimit: 32Gi
          resourceMemoryRequest: 16Gi
pipelineInfo:
  description: Synthetic data generation with Isaac Sim Replicator, model training
    with TAO DetectNet_v2, and experiment tracking + model registration with MLflow.
  name: isaac-synth-train-validate
root:
  dag:
    tasks:
      clone-sdg-repo:
        cachingOptions:
          enableCache: true
        componentRef:
          name: comp-clone-sdg-repo
        taskInfo:
          name: clone-sdg-repo
      convert-to-tfrecords:
        cachingOptions:
          enableCache: true
        componentRef:
          name: comp-convert-to-tfrecords
        dependentTasks:
        - generate-synthetic-data
        taskInfo:
          name: convert-to-tfrecords
      evaluate-and-register:
        cachingOptions:
          enableCache: true
        componentRef:
          name: comp-evaluate-and-register
        dependentTasks:
        - train-detectnet
        inputs:
          parameters:
            batch_size:
              componentInputParameter: batch_size
            distractors:
              componentInputParameter: distractors
            epochs:
              componentInputParameter: epochs
            experiment_name:
              componentInputParameter: experiment_name
            height:
              componentInputParameter: height
            map_threshold:
              componentInputParameter: map_threshold
            mlflow_s3_endpoint:
              componentInputParameter: mlflow_s3_endpoint
            mlflow_tracking_uri:
              componentInputParameter: mlflow_tracking_uri
            num_frames:
              componentInputParameter: num_frames
            width:
              componentInputParameter: width
        taskInfo:
          name: evaluate-and-register
      generate-synthetic-data:
        cachingOptions:
          enableCache: true
        componentRef:
          name: comp-generate-synthetic-data
        dependentTasks:
        - clone-sdg-repo
        inputs:
          parameters:
            distractors:
              componentInputParameter: distractors
            height:
              componentInputParameter: height
            num_frames:
              componentInputParameter: num_frames
            width:
              componentInputParameter: width
        taskInfo:
          name: generate-synthetic-data
      train-detectnet:
        cachingOptions:
          enableCache: true
        componentRef:
          name: comp-train-detectnet
        dependentTasks:
        - convert-to-tfrecords
        inputs:
          parameters:
            encryption_key:
              componentInputParameter: encryption_key
        taskInfo:
          name: train-detectnet
  inputDefinitions:
    parameters:
      batch_size:
        defaultValue: 4.0
        isOptional: true
        parameterType: NUMBER_INTEGER
      distractors:
        defaultValue: warehouse
        isOptional: true
        parameterType: STRING
      encryption_key:
        defaultValue: tao_key
        isOptional: true
        parameterType: STRING
      epochs:
        defaultValue: 2.0
        isOptional: true
        parameterType: NUMBER_INTEGER
      experiment_name:
        defaultValue: palletjack-detectnet-v2
        isOptional: true
        parameterType: STRING
      height:
        defaultValue: 544.0
        isOptional: true
        parameterType: NUMBER_INTEGER
      map_threshold:
        defaultValue: 0.0
        isOptional: true
        parameterType: NUMBER_DOUBLE
      mlflow_s3_endpoint:
        defaultValue: http://minio.isaac-mlops-poc.svc:9000
        isOptional: true
        parameterType: STRING
      mlflow_tracking_uri:
        defaultValue: https://mlflow.redhat-ods-applications.svc:8443
        isOptional: true
        parameterType: STRING
      num_frames:
        defaultValue: 100.0
        isOptional: true
        parameterType: NUMBER_INTEGER
      width:
        defaultValue: 960.0
        isOptional: true
        parameterType: NUMBER_INTEGER
schemaVersion: 2.1.0
sdkVersion: kfp-2.16.0
---
platforms:
  kubernetes:
    deploymentSpec:
      executors:
        exec-clone-sdg-repo:
          pvcMount:
          - constant: workspace-data
            mountPath: /workspace/sdg
            pvcNameParameter:
              runtimeValue:
                constant: workspace-data
        exec-convert-to-tfrecords:
          configMapAsVolume:
          - configMapName: tao-specs
            configMapNameParameter:
              runtimeValue:
                constant: tao-specs
            mountPath: /workspace/specs
            optional: false
          imagePullSecret:
          - secretName: ngc-secret
            secretNameParameter:
              runtimeValue:
                constant: ngc-secret
          nodeSelector:
            labels:
              nvidia.com/gpu.product: NVIDIA-L40S
          pvcMount:
          - constant: synthetic-data
            mountPath: /workspace/data
            pvcNameParameter:
              runtimeValue:
                constant: synthetic-data
          - constant: tfrecords
            mountPath: /workspace/tfrecords
            pvcNameParameter:
              runtimeValue:
                constant: tfrecords
          tolerations:
          - effect: NoSchedule
            key: nvidia.com/gpu
            operator: Exists
        exec-evaluate-and-register:
          configMapAsVolume:
          - configMapName: tao-specs
            configMapNameParameter:
              runtimeValue:
                constant: tao-specs
            mountPath: /workspace/specs
            optional: false
          pvcMount:
          - constant: model-artifacts
            mountPath: /workspace/output
            pvcNameParameter:
              runtimeValue:
                constant: model-artifacts
          secretAsEnv:
          - keyToEnv:
            - envVar: MINIO_ACCESS_KEY
              secretKey: accesskey
            - envVar: MINIO_SECRET_KEY
              secretKey: secretkey
            optional: false
            secretName: minio-credentials
            secretNameParameter:
              runtimeValue:
                constant: minio-credentials
        exec-generate-synthetic-data:
          emptyDirMounts:
          - mountPath: /isaac-sim/kit/cache
            volumeName: cache
          - mountPath: /root/.cache/nvidia/GLCache
            volumeName: glcache
          - mountPath: /root/.nv/ComputeCache
            volumeName: computecache
          - mountPath: /.nvidia-omniverse
            volumeName: omniverse
          imagePullSecret:
          - secretName: ngc-secret
            secretNameParameter:
              runtimeValue:
                constant: ngc-secret
          nodeSelector:
            labels:
              nvidia.com/gpu.product: NVIDIA-L40S
          pvcMount:
          - constant: workspace-data
            mountPath: /workspace/sdg
            pvcNameParameter:
              runtimeValue:
                constant: workspace-data
          - constant: synthetic-data
            mountPath: /output
            pvcNameParameter:
              runtimeValue:
                constant: synthetic-data
          tolerations:
          - effect: NoSchedule
            key: nvidia.com/gpu
            operator: Exists
        exec-train-detectnet:
          configMapAsVolume:
          - configMapName: tao-specs
            configMapNameParameter:
              runtimeValue:
                constant: tao-specs
            mountPath: /workspace/specs
            optional: false
          emptyDirMounts:
          - mountPath: /workspace/pretrained
            volumeName: pretrained
          imagePullSecret:
          - secretName: ngc-secret
            secretNameParameter:
              runtimeValue:
                constant: ngc-secret
          nodeSelector:
            labels:
              nvidia.com/gpu.product: NVIDIA-L40S
          pvcMount:
          - constant: synthetic-data
            mountPath: /workspace/data
            pvcNameParameter:
              runtimeValue:
                constant: synthetic-data
          - constant: model-artifacts
            mountPath: /workspace/output
            pvcNameParameter:
              runtimeValue:
                constant: model-artifacts
          - constant: tfrecords
            mountPath: /workspace/tfrecords
            pvcNameParameter:
              runtimeValue:
                constant: tfrecords
          secretAsEnv:
          - keyToEnv:
            - envVar: NGC_API_KEY
              secretKey: NGC_API_KEY
            optional: false
            secretName: ngc-api-key
            secretNameParameter:
              runtimeValue:
                constant: ngc-api-key
          tolerations:
          - effect: NoSchedule
            key: nvidia.com/gpu
            operator: Exists
