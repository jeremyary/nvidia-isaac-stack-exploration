# PIPELINE DEFINITION
# Name: dspa-smoke-test
# Description: Trivial pipeline to verify DSPA works
components:
  comp-hello:
    executorLabel: exec-hello
    inputDefinitions:
      parameters:
        message:
          parameterType: STRING
    outputDefinitions:
      parameters:
        Output:
          parameterType: STRING
deploymentSpec:
  executors:
    exec-hello:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - hello
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'kfp==2.11.0'\
          \ '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"3.9\"' && \"\
          $0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef hello(message: str) -> str:\n    print(f\"Hello from DSPA: {message}\"\
          )\n    return message\n\n"
        image: registry.access.redhat.com/ubi9/python-311:latest
pipelineInfo:
  description: Trivial pipeline to verify DSPA works
  name: dspa-smoke-test
root:
  dag:
    tasks:
      hello:
        cachingOptions:
          enableCache: true
        componentRef:
          name: comp-hello
        inputs:
          parameters:
            message:
              runtimeValue:
                constant: Phase 2 pipeline server is functional
        taskInfo:
          name: hello
schemaVersion: 2.1.0
sdkVersion: kfp-2.11.0
