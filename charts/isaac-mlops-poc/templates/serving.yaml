# This project was developed with assistance from AI tools.
{{- if .Values.serving.enabled }}
# S3 credentials for KServe storage initializer.
# KServe uses annotations on the secret to configure S3 access.
apiVersion: v1
kind: Secret
metadata:
  name: minio-credentials-serving
  namespace: {{ include "isaac-mlops.namespace" . }}
  labels:
    {{- include "isaac-mlops.labels" . | nindent 4 }}
  annotations:
    serving.kserve.io/s3-endpoint: minio.{{ include "isaac-mlops.namespace" . }}.svc:9000
    serving.kserve.io/s3-usehttps: "0"
    serving.kserve.io/s3-region: us-east-1
    serving.kserve.io/s3-verifyssl: "0"
stringData:
  AWS_ACCESS_KEY_ID: {{ .Values.minio.credentials.user }}
  AWS_SECRET_ACCESS_KEY: {{ .Values.minio.credentials.password }}
---
# ServiceAccount for model serving pods — the KServe storage initializer
# reads S3 credentials from secrets linked to this SA.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: model-serving
  namespace: {{ include "isaac-mlops.namespace" . }}
  labels:
    {{- include "isaac-mlops.labels" . | nindent 4 }}
secrets:
- name: minio-credentials-serving
---
# OVMS ServingRuntime — OpenVINO Model Server supports ONNX natively.
# Pre-installed in RHOAI but defined explicitly for reproducibility.
apiVersion: serving.kserve.io/v1alpha1
kind: ServingRuntime
metadata:
  name: ovms-runtime
  namespace: {{ include "isaac-mlops.namespace" . }}
  labels:
    {{- include "isaac-mlops.labels" . | nindent 4 }}
spec:
  supportedModelFormats:
  - name: onnx
    version: "1"
    autoSelect: true
  - name: openvino_ir
    version: openvino_ir
    autoSelect: true
  multiModel: false
  containers:
  - name: kserve-container
    image: {{ .Values.serving.ovms.image }}
    args:
    - --model_name={{`{{.Name}}`}}
    - --model_path=/mnt/models
    - --target_device=CPU
    - --port=8001
    - --rest_port=8888
    ports:
    - containerPort: 8888
      protocol: TCP
---
# Triton ServingRuntime — NVIDIA's inference server with guaranteed
# DetectNet_v2 compatibility. Requires NGC pull secret and GPU.
apiVersion: serving.kserve.io/v1alpha1
kind: ServingRuntime
metadata:
  name: triton-runtime
  namespace: {{ include "isaac-mlops.namespace" . }}
  labels:
    {{- include "isaac-mlops.labels" . | nindent 4 }}
spec:
  supportedModelFormats:
  - name: onnx
    version: "1"
    autoSelect: true
  - name: tensorrt
    version: "1"
  multiModel: false
  containers:
  - name: kserve-container
    image: {{ .Values.serving.triton.image }}
    args:
    - tritonserver
    - --model-repository=/mnt/models
    - --model-control-mode=none
    - --strict-model-config=false
    ports:
    - containerPort: 8000
      protocol: TCP
    resources:
      limits:
        nvidia.com/gpu: {{ .Values.serving.inference.gpu | quote }}
        memory: {{ .Values.serving.inference.memory }}
      requests:
        nvidia.com/gpu: {{ .Values.serving.inference.gpu | quote }}
        memory: {{ .Values.serving.inference.memoryRequest }}
  imagePullSecrets:
  - name: ngc-secret
{{- end }}
