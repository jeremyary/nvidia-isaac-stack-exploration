# This project was developed with assistance from AI tools.
{{- if .Values.modelRegistry.enabled }}
# Wait for Postgres to initialize, then fix any dirty migration flag
# left by the Model Registry operator's race condition on first deploy.
# The operator creates the registry server immediately when it sees
# the ModelRegistry CR, but Postgres may still be initializing —
# the migration fails partway and marks schema_migrations as dirty.
# This hook runs after install, waits for stability, and clears the
# dirty flag so the registry server can retry successfully.
apiVersion: batch/v1
kind: Job
metadata:
  name: model-registry-fix-migrations
  namespace: {{ include "isaac-mlops.namespace" . }}
  labels:
    {{- include "isaac-mlops.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: post-install
    helm.sh/hook-weight: "10"
    helm.sh/hook-delete-policy: hook-succeeded
spec:
  template:
    spec:
      containers:
      - name: fix-migrations
        image: {{ .Values.modelRegistry.database.image }}
        env:
        - name: HOME
          value: /tmp
        - name: PGHOST
          value: {{ .Values.modelRegistry.name }}-postgres.{{ .Values.modelRegistry.namespace }}.svc.cluster.local
        - name: PGUSER
          value: {{ .Values.modelRegistry.database.user }}
        - name: PGPASSWORD
          value: {{ .Values.modelRegistry.database.password }}
        - name: PGDATABASE
          value: {{ .Values.modelRegistry.database.name }}
        command: ["/bin/bash", "-c"]
        args:
        - |
          echo "Waiting for Postgres to accept queries..."
          until psql -c "SELECT 1" >/dev/null 2>&1; do
            sleep 3
          done
          echo "Postgres ready"
          # Wait for the registry server to attempt its first migration
          echo "Waiting for schema_migrations table..."
          for i in $(seq 1 60); do
            if psql -c "SELECT 1 FROM schema_migrations" >/dev/null 2>&1; then
              break
            fi
            sleep 2
          done
          # Fix dirty migration if present
          DIRTY=$(psql -t -c "SELECT dirty FROM schema_migrations LIMIT 1" 2>/dev/null | tr -d ' ')
          if [ "$DIRTY" = "t" ]; then
            echo "Dirty migration detected — clearing flag"
            psql -c "UPDATE schema_migrations SET dirty = false"
            echo "Migration flag cleared — registry server will recover on next restart"
          else
            echo "No dirty migration — registry initialized cleanly"
          fi
      restartPolicy: Never
  backoffLimit: 3
{{- end }}
