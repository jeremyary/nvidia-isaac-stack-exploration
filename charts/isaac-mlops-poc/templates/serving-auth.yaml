# This project was developed with assistance from AI tools.
{{- if and .Values.serving.enabled .Values.serving.auth.enabled }}
{{- $existingSecret := lookup "v1" "Secret" (include "isaac-mlops.namespace" .) "inference-api-key" }}
{{- $apiKey := "" }}
{{- if and $existingSecret $existingSecret.data }}
  {{- $apiKey = index $existingSecret.data "api-key" | b64dec }}
{{- else if .Values.serving.auth.apiKey }}
  {{- $apiKey = .Values.serving.auth.apiKey }}
{{- else }}
  {{- $apiKey = randAlphaNum 32 }}
{{- end }}
# API key secret — auto-generated on first install, preserved across upgrades.
apiVersion: v1
kind: Secret
metadata:
  name: inference-api-key
  namespace: {{ include "isaac-mlops.namespace" . }}
  labels:
    {{- include "isaac-mlops.labels" . | nindent 4 }}
stringData:
  api-key: {{ $apiKey }}
---
# Nginx config — validates X-API-Key header before proxying to OVMS/Triton.
apiVersion: v1
kind: ConfigMap
metadata:
  name: inference-gateway-config
  namespace: {{ include "isaac-mlops.namespace" . }}
  labels:
    {{- include "isaac-mlops.labels" . | nindent 4 }}
data:
  nginx.conf: |
    pid /tmp/nginx.pid;
    events { worker_connections 128; }
    http {
      client_body_temp_path /tmp/client_body;
      proxy_temp_path /tmp/proxy;
      fastcgi_temp_path /tmp/fastcgi;
      uwsgi_temp_path /tmp/uwsgi;
      scgi_temp_path /tmp/scgi;
      server {
        listen 8080;

        location /v2/health/ {
          proxy_pass http://palletjack-detectnet-v2-predictor.{{ include "isaac-mlops.namespace" . }}.svc.cluster.local:8888;
        }

        location / {
          set $api_key '';
          if ($http_x_api_key != '') {
            set $api_key $http_x_api_key;
          }
          if ($http_authorization ~ "^Bearer (.+)$") {
            set $api_key $1;
          }
          if ($api_key = '') {
            return 401 '{"error": "missing API key — set X-API-Key or Authorization: Bearer <key>"}';
          }
          if ($api_key != '{{ $apiKey }}') {
            return 403 '{"error": "invalid API key"}';
          }
          proxy_pass http://palletjack-detectnet-v2-predictor.{{ include "isaac-mlops.namespace" . }}.svc.cluster.local:8888;
          proxy_set_header Host $host;
          proxy_read_timeout 300s;
        }
      }
    }
---
# Nginx gateway deployment — lightweight API key proxy in front of the ISVC.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: inference-gateway
  namespace: {{ include "isaac-mlops.namespace" . }}
  labels:
    {{- include "isaac-mlops.labels" . | nindent 4 }}
    app: inference-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: inference-gateway
  template:
    metadata:
      labels:
        app: inference-gateway
    spec:
      containers:
      - name: nginx
        image: registry.access.redhat.com/ubi9/nginx-124:latest
        command: ["nginx", "-g", "daemon off;", "-c", "/opt/app-root/nginx.conf"]
        ports:
        - containerPort: 8080
        volumeMounts:
        - name: config
          mountPath: /opt/app-root/nginx.conf
          subPath: nginx.conf
        resources:
          limits:
            memory: 128Mi
            cpu: 200m
          requests:
            memory: 64Mi
            cpu: 50m
      volumes:
      - name: config
        configMap:
          name: inference-gateway-config
---
apiVersion: v1
kind: Service
metadata:
  name: inference-gateway
  namespace: {{ include "isaac-mlops.namespace" . }}
  labels:
    {{- include "isaac-mlops.labels" . | nindent 4 }}
spec:
  selector:
    app: inference-gateway
  ports:
  - port: 8080
    targetPort: 8080
    protocol: TCP
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: inference-gateway
  namespace: {{ include "isaac-mlops.namespace" . }}
  labels:
    {{- include "isaac-mlops.labels" . | nindent 4 }}
spec:
  to:
    kind: Service
    name: inference-gateway
  port:
    targetPort: 8080
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
{{- end }}
