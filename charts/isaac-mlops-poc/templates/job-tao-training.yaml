{{- if and .Values.tao.enabled .Values.tao.testJob }}
apiVersion: batch/v1
kind: Job
metadata:
  name: test-tao-training
  namespace: {{ include "isaac-mlops.namespace" . }}
  labels:
    {{- include "isaac-mlops.labels" . | nindent 4 }}
spec:
  backoffLimit: 1
  template:
    metadata:
      labels:
        app: tao-training
    spec:
      imagePullSecrets:
      - name: ngc-secret
      securityContext:
        runAsUser: 0
        fsGroup: 0
      containers:
      - name: tao
        image: {{ .Values.tao.image }}
        command: ["/bin/bash", "-c"]
        args:
        - |
          set -e
          echo "=== TAO Toolkit Training Pipeline ==="
          echo "GPU info:"
          nvidia-smi

          echo "=== Step 1: Verify input data ==="
          ls /workspace/data/palletjack_data/warehouse/Camera/rgb/ | head -5
          ls /workspace/data/palletjack_data/warehouse/Camera/object_detection/ | head -5
          echo "RGB count: $(ls /workspace/data/palletjack_data/warehouse/Camera/rgb/ | wc -l)"
          echo "Label count: $(ls /workspace/data/palletjack_data/warehouse/Camera/object_detection/ | wc -l)"

          echo "=== Step 2: Download pretrained ResNet18 model ==="
          mkdir -p /workspace/pretrained
          wget -q --content-disposition \
            {{ .Values.tao.training.pretrainedModelUrl | quote }} \
            -O /workspace/pretrained/resnet18.hdf5
          ls -la /workspace/pretrained/

          echo "=== Step 3: Convert KITTI to TFRecords ==="
          mkdir -p /workspace/tfrecords/warehouse
          detectnet_v2 dataset_convert \
            -d /workspace/specs/tfrecords_warehouse.txt \
            -o /workspace/tfrecords/warehouse/tfrecord

          echo "=== Step 4: Train DetectNet_v2 ({{ .Values.tao.training.epochs }} epochs) ==="
          mkdir -p /workspace/output/resnet18_palletjack
          detectnet_v2 train \
            -e /workspace/specs/training_resnet18.txt \
            -r /workspace/output/resnet18_palletjack \
            -k {{ .Values.tao.training.encryptionKey }} \
            --gpus 1

          echo "=== Training complete ==="
          echo "Output contents:"
          find /workspace/output/ -type f | head -20
          ls -la /workspace/output/resnet18_palletjack/weights/ 2>/dev/null || true
        env:
        - name: NGC_API_KEY
          valueFrom:
            secretKeyRef:
              name: ngc-api-key
              key: NGC_API_KEY
        resources:
          limits:
            nvidia.com/gpu: {{ .Values.tao.resources.limits.gpu }}
            memory: {{ .Values.tao.resources.limits.memory }}
            cpu: {{ .Values.tao.resources.limits.cpu | quote }}
          requests:
            nvidia.com/gpu: {{ .Values.tao.resources.requests.gpu }}
            memory: {{ .Values.tao.resources.requests.memory }}
            cpu: {{ .Values.tao.resources.requests.cpu | quote }}
        volumeMounts:
        - name: synthetic-data
          mountPath: /workspace/data
        - name: model-artifacts
          mountPath: /workspace/output
        - name: specs
          mountPath: /workspace/specs
        - name: scratch
          mountPath: /workspace/tfrecords
        - name: pretrained
          mountPath: /workspace/pretrained
      nodeSelector:
        {{- include "isaac-mlops.gpuNodeSelector" . | nindent 8 }}
      tolerations:
        {{- include "isaac-mlops.gpuTolerations" . | nindent 8 }}
      restartPolicy: Never
      volumes:
      - name: synthetic-data
        persistentVolumeClaim:
          claimName: synthetic-data
      - name: model-artifacts
        persistentVolumeClaim:
          claimName: model-artifacts
      - name: specs
        configMap:
          name: tao-specs
      - name: scratch
        emptyDir: {}
      - name: pretrained
        emptyDir: {}
{{- end }}
