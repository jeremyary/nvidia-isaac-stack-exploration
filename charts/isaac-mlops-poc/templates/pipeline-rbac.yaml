# This project was developed with assistance from AI tools.
{{- if .Values.dspa.enabled }}
# Grant anyuid SCC to the DSPA pipeline runner SA.
# NVIDIA containers (Isaac Sim, TAO Toolkit) require root access.
# The SA name follows the DSPA naming convention: pipeline-runner-<dspa-name>
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "isaac-mlops.namespace" . }}-pipeline-anyuid
  labels:
    {{- include "isaac-mlops.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:openshift:scc:anyuid
subjects:
- kind: ServiceAccount
  name: pipeline-runner-isaac-pipelines
  namespace: {{ include "isaac-mlops.namespace" . }}
{{- if .Values.mlflow.enabled }}
---
# MLflow edit permissions — allows pipeline steps to create experiments,
# log runs, and register models via RHOAI MLflow K8s workspace auth.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "isaac-mlops.namespace" . }}-pipeline-mlflow-edit
  labels:
    {{- include "isaac-mlops.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: mlflow-operator-mlflow-edit
subjects:
- kind: ServiceAccount
  name: pipeline-runner-isaac-pipelines
  namespace: {{ include "isaac-mlops.namespace" . }}
---
# MLflow view permissions — allows pipeline steps to read experiments
# and model registry via RHOAI MLflow K8s workspace auth.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "isaac-mlops.namespace" . }}-pipeline-mlflow-view
  labels:
    {{- include "isaac-mlops.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: mlflow-operator-mlflow-view
subjects:
- kind: ServiceAccount
  name: pipeline-runner-isaac-pipelines
  namespace: {{ include "isaac-mlops.namespace" . }}
{{- end }}
{{- if .Values.tao.enabled }}
---
# Kubeflow Trainer v2 — allows pipeline steps to create, monitor, and
# clean up TrainJob resources for GPU training (shows in RHOAI dashboard).
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: pipeline-runner-trainjob-edit
  namespace: {{ include "isaac-mlops.namespace" . }}
  labels:
    {{- include "isaac-mlops.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: kueue-trainjob-editor-role
subjects:
- kind: ServiceAccount
  name: pipeline-runner-isaac-pipelines
  namespace: {{ include "isaac-mlops.namespace" . }}
---
# ClusterTrainingRuntime read access — allows the Kubeflow TrainerClient SDK
# to look up the ClusterTrainingRuntime referenced by each TrainJob.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: cluster-training-runtime-reader
  labels:
    {{- include "isaac-mlops.labels" . | nindent 4 }}
rules:
- apiGroups: ["trainer.kubeflow.org"]
  resources: ["clustertrainingruntimes"]
  verbs: ["get", "list", "watch"]
---
# Namespace-scoped TrainingRuntime read access — the Kubeflow Trainer SDK
# checks namespace-scoped TrainingRuntimes first and only falls through to
# ClusterTrainingRuntime on a 404. Without this, the SA gets a 403 which
# the SDK treats as a hard failure.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: training-runtime-reader
  namespace: {{ include "isaac-mlops.namespace" . }}
  labels:
    {{- include "isaac-mlops.labels" . | nindent 4 }}
rules:
- apiGroups: ["trainer.kubeflow.org"]
  resources: ["trainingruntimes"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "isaac-mlops.namespace" . }}-training-runtime-reader
  namespace: {{ include "isaac-mlops.namespace" . }}
  labels:
    {{- include "isaac-mlops.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: training-runtime-reader
subjects:
- kind: ServiceAccount
  name: pipeline-runner-isaac-pipelines
  namespace: {{ include "isaac-mlops.namespace" . }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "isaac-mlops.namespace" . }}-runtime-reader
  labels:
    {{- include "isaac-mlops.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-training-runtime-reader
subjects:
- kind: ServiceAccount
  name: pipeline-runner-isaac-pipelines
  namespace: {{ include "isaac-mlops.namespace" . }}
{{- end }}
{{- if .Values.serving.enabled }}
---
# KServe InferenceService management — allows pipeline steps to create,
# update, and monitor InferenceService resources for model deployment.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: inferenceservice-manager
  namespace: {{ include "isaac-mlops.namespace" . }}
  labels:
    {{- include "isaac-mlops.labels" . | nindent 4 }}
rules:
- apiGroups: ["serving.kserve.io"]
  resources: ["inferenceservices"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
- apiGroups: ["serving.kserve.io"]
  resources: ["inferenceservices/status"]
  verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: pipeline-runner-inferenceservice-manager
  namespace: {{ include "isaac-mlops.namespace" . }}
  labels:
    {{- include "isaac-mlops.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: inferenceservice-manager
subjects:
- kind: ServiceAccount
  name: pipeline-runner-isaac-pipelines
  namespace: {{ include "isaac-mlops.namespace" . }}
{{- end }}
{{- end }}
